<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token & Dog Cleaner</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #ebedf0; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        button { background: #447bba; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; margin-bottom: 10px; }
        #tokenArea { display: none; margin-top: 15px; padding: 10px; background: #f0f0f0; word-break: break-all; border-radius: 5px; font-size: 12px; border: 1px dashed #999; }
        #log { margin-top: 20px; text-align: left; font-size: 13px; max-height: 200px; overflow-y: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

<div class="card">
    <h3>Управление токеном</h3>
    <button onclick="getToken()">1. Получить рабочий токен</button>
    <div id="tokenArea"></div>
    <button id="copyBtn" style="display:none; background: #4caf50;" onclick="copyToken()">2. Копировать для Termux</button>
    
    <hr>
    
    <h3>Очистка (внутри ВК)</h3>
    <button style="background: #ef5350;" onclick="startClean()">Запустить очистку</button>
    <div id="log"></div>
</div>

<script>
    vkBridge.send('VKWebAppInit');
    let currentToken = '';

    async function getToken() {
        try {
            const auth = await vkBridge.send("VKWebAppGetAuthToken", {"app_id": 54566958, "scope": "friends"});
            currentToken = auth.access_token;
            document.getElementById('tokenArea').innerText = currentToken;
            document.getElementById('tokenArea').style.display = 'block';
            document.getElementById('copyBtn').style.display = 'block';
        } catch (e) { alert("Ошибка получения: " + JSON.stringify(e)); }
    }

    function copyToken() {
        navigator.clipboard.writeText(currentToken);
        alert("Токен в буфере! Вставляй его в Python-скрипт.");
    }

    async function startClean() {
        const log = document.getElementById('log');
        log.innerHTML = "Поиск собак...<br>";
        try {
            if(!currentToken) await getToken();
            const data = await vkBridge.send("VKWebAppCallAPIMethod", {
                "method": "friends.get",
                "params": {"fields": "deactivated", "v": "5.131", "access_token": currentToken}
            });
            const dogs = data.response.items.filter(f => f.deactivated);
            log.innerHTML += `Найдено собак: ${dogs.length}<br>`;
            
            for (let dog of dogs) {
                try {
                    await vkBridge.send("VKWebAppCallAPIMethod", {
                        "method": "friends.delete",
                        "params": {"user_id": dog.id, "v": "5.131", "access_token": currentToken}
                    });
                    log.innerHTML += `<span class="success">Удален id${dog.id}</span><br>`;
                } catch (e) {
                    log.innerHTML += `<span class="error">Блокировка Bridge: Удаление id${dog.id} невозможно через интерфейс приложения.</span><br>`;
                    break; // Если один не удалился из-за прав, другие тоже не удалятся
                }
            }
        } catch (e) { log.innerHTML += "Ошибка: " + JSON.stringify(e); }
    }
</script>
</body>
</html>
